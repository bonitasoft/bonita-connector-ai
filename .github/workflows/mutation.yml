# =============================================================================
# Test Coverage & Mutation Testing
# =============================================================================
# Runs JaCoCo coverage on ALL modules + PIT mutation testing on compatible ones.
#
# Pitest is incompatible with heavy SDKs (Gemini, Anthropic, Azure) on CI.
# Compatible modules: DeepSeek, Groq, Cohere, OpenAI, Mistral, Ollama.
# =============================================================================

name: Test Coverage & Mutation Testing

on:
  workflow_dispatch:
    inputs:
      mutators:
        description: 'Mutator group'
        required: true
        default: 'DEFAULTS'
        type: choice
        options:
          - DEFAULTS
          - STRONGER

permissions:
  contents: read

jobs:
  coverage:
    name: JaCoCo Coverage (all modules)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: maven

      - name: Configure Maven Settings
        uses: bonitasoft/maven-settings-action@v1
        with:
          keeper-secret-config: ${{ secrets.KSM_CONFIG }}

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build and test all modules
        run: ./mvnw -B -ntp clean verify -Djacoco.skip=false

      - name: Generate Coverage Summary
        if: always()
        run: |
          echo "## JaCoCo Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Line Coverage | Branch Coverage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------|----------------|--------|" >> $GITHUB_STEP_SUMMARY

          for module_dir in bonita-connector-ai-*/; do
            module=$(basename "$module_dir")
            short=${module#bonita-connector-ai-}
            xml="$module_dir/target/site/jacoco/jacoco.xml"

            if [ -f "$xml" ]; then
              # Extract line coverage
              LINE_MISSED=$(grep -o 'type="LINE"[^/]*' "$xml" | tail -1 | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*')
              LINE_COVERED=$(grep -o 'type="LINE"[^/]*' "$xml" | tail -1 | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*')
              if [ -n "$LINE_MISSED" ] && [ -n "$LINE_COVERED" ]; then
                LINE_TOTAL=$((LINE_MISSED + LINE_COVERED))
                if [ "$LINE_TOTAL" -gt 0 ]; then
                  LINE_PCT=$((LINE_COVERED * 100 / LINE_TOTAL))
                else
                  LINE_PCT=0
                fi
              else
                LINE_PCT="-"
              fi

              # Extract branch coverage
              BR_MISSED=$(grep -o 'type="BRANCH"[^/]*' "$xml" | tail -1 | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*')
              BR_COVERED=$(grep -o 'type="BRANCH"[^/]*' "$xml" | tail -1 | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*')
              if [ -n "$BR_MISSED" ] && [ -n "$BR_COVERED" ]; then
                BR_TOTAL=$((BR_MISSED + BR_COVERED))
                if [ "$BR_TOTAL" -gt 0 ]; then
                  BR_PCT=$((BR_COVERED * 100 / BR_TOTAL))
                else
                  BR_PCT=0
                fi
              else
                BR_PCT="-"
              fi

              # Status emoji
              if [ "$LINE_PCT" != "-" ] && [ "$LINE_PCT" -ge 95 ]; then
                STATUS="pass"
              elif [ "$LINE_PCT" != "-" ] && [ "$LINE_PCT" -ge 80 ]; then
                STATUS="warn"
              else
                STATUS="fail"
              fi

              echo "| **${short}** | ${LINE_PCT}% (${LINE_COVERED}/${LINE_TOTAL}) | ${BR_PCT}% (${BR_COVERED}/${BR_TOTAL}) | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload JaCoCo Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 30

  mutation:
    name: PIT Mutation (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - bonita-connector-ai-deepseek
          - bonita-connector-ai-groq
          - bonita-connector-ai-cohere
          - bonita-connector-ai-openai
          - bonita-connector-ai-mistral
          - bonita-connector-ai-ollama

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: maven

      - name: Configure Maven Settings
        uses: bonitasoft/maven-settings-action@v1
        with:
          keeper-secret-config: ${{ secrets.KSM_CONFIG }}

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run PIT Mutation Testing
        run: |
          ./mvnw -B -ntp clean test org.pitest:pitest-maven:mutationCoverage \
            -pl ${{ matrix.module }} -am \
            -Dmutators="${{ inputs.mutators }}" \
            -DoutputFormats=HTML,CSV \
            -DtimestampedReports=false \
            -Djacoco.skip=true \
            -DargLine=" "
        timeout-minutes: 15

      - name: Generate Mutation Summary
        if: always()
        run: |
          MODULE="${{ matrix.module }}"
          SHORT=${MODULE#bonita-connector-ai-}
          echo "## Mutation Testing: ${SHORT}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CSV=$(find . -path "*/${MODULE}/target/pit-reports/mutations.csv" | head -1)
          if [ -f "$CSV" ]; then
            TOTAL=$(wc -l < "$CSV")
            KILLED=$(grep -c ",KILLED," "$CSV" 2>/dev/null || echo 0)
            SURVIVED=$(grep -c ",SURVIVED," "$CSV" 2>/dev/null || echo 0)
            NO_COV=$(grep -c ",NO_COVERAGE," "$CSV" 2>/dev/null || echo 0)
            TIMED=$(grep -c ",TIMED_OUT," "$CSV" 2>/dev/null || echo 0)

            if [ "$TOTAL" -gt 0 ]; then
              SCORE=$((KILLED * 100 / TOTAL))
              DETECTED=$((KILLED + TIMED))
              if [ "$((TOTAL - NO_COV))" -gt 0 ]; then
                STRENGTH=$((DETECTED * 100 / (TOTAL - NO_COV)))
              else
                STRENGTH=0
              fi
            else
              SCORE=0
              STRENGTH=0
            fi

            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| **Mutation Score** | **${SCORE}%** (${KILLED}/${TOTAL} killed) |" >> $GITHUB_STEP_SUMMARY
            echo "| **Test Strength** | **${STRENGTH}%** |" >> $GITHUB_STEP_SUMMARY
            echo "| Survived | ${SURVIVED} |" >> $GITHUB_STEP_SUMMARY
            echo "| No Coverage | ${NO_COV} |" >> $GITHUB_STEP_SUMMARY
            echo "| Timed Out | ${TIMED} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$SURVIVED" -gt 0 ]; then
              echo "<details><summary>Surviving mutants (${SURVIVED})</summary>" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep ",SURVIVED," "$CSV" | while IFS=',' read -r FILE CLASS MUTATOR METHOD LINE STATUS REST; do
                echo "  ${CLASS}:${LINE} (${MUTATOR}) in ${METHOD}"
              done >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "</details>" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "> Pitest report not found. Module may be incompatible." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload PIT Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-report-${{ matrix.module }}
          path: '**/target/pit-reports/'
          retention-days: 30
