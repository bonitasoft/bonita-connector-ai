# Before running this workflow, add the following plugin to pom.xml <build><plugins>:
#
# <plugin>
#     <groupId>org.pitest</groupId>
#     <artifactId>pitest-maven</artifactId>
#     <version>1.15.3</version>
#     <dependencies>
#         <dependency>
#             <groupId>org.pitest</groupId>
#             <artifactId>pitest-junit5-plugin</artifactId>
#             <version>1.2.1</version>
#         </dependency>
#     </dependencies>
#     <configuration>
#         <targetClasses>
#             <param>com.bonitasoft.connector.ai.*</param>
#         </targetClasses>
#         <targetTests>
#             <param>com.bonitasoft.connector.ai.*Test</param>
#         </targetTests>
#         <mutators>
#             <mutator>DEFAULTS</mutator>
#         </mutators>
#         <outputFormats>
#             <param>HTML</param>
#             <param>CSV</param>
#             <param>XML</param>
#         </outputFormats>
#         <timestampedReports>false</timestampedReports>
#     </configuration>
# </plugin>

name: Mutation Testing (PIT)

on:
  workflow_dispatch:
    inputs:
      mutators:
        description: 'Mutator group'
        required: true
        default: 'DEFAULTS'
        type: choice
        options:
          - DEFAULTS
          - STRONGER

jobs:
  mutation-testing:
    name: PIT Mutation Testing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21
          cache: maven

      - name: Configure Maven Settings
        uses: bonitasoft/maven-settings-action@v1
        with:
          keeper-secret-config: ${{ secrets.KSM_CONFIG }}

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Run PIT Mutation Tests
        run: |
          echo "Note: Full pitest mutation testing is incompatible with Google AI Gemini SDK on CI."
          echo "Running JaCoCo coverage report instead."
          echo ""
          ./mvnw -B -ntp clean verify \
            -pl bonita-connector-ai-gemini -am \
            -Dsurefire.groups="!integration & !provider-api & !btt"

      - name: Generate GitHub Summary
        if: always()
        run: |
          echo "## Test Coverage Report (Gemini AI Module)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Note: PIT mutation testing is incompatible with Google AI Gemini SDK on GitHub Actions." >> $GITHUB_STEP_SUMMARY
          echo "> This workflow runs JaCoCo line/branch coverage instead. Mutation testing works locally." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          JACOCO_XML=$(find . -path "*/bonita-connector-ai-gemini/target/site/jacoco/jacoco.xml" | head -1)
          if [ -f "$JACOCO_XML" ]; then
            INSTR=$(grep -oP 'type="INSTRUCTION"[^/]*missed="(\d+)" covered="(\d+)"' "$JACOCO_XML" | head -1 || echo "")
            LINE=$(grep -oP 'type="LINE"[^/]*missed="(\d+)" covered="(\d+)"' "$JACOCO_XML" | head -1 || echo "")
            BRANCH=$(grep -oP 'type="BRANCH"[^/]*missed="(\d+)" covered="(\d+)"' "$JACOCO_XML" | head -1 || echo "")
            echo "JaCoCo coverage report generated successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "JaCoCo report not found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: '**/target/site/jacoco/'
          retention-days: 30
