# =============================================================================
# Test Coverage Report
# =============================================================================
# Runs JaCoCo coverage on ALL modules and displays results in GitHub Summary.
# PIT mutation testing is not compatible with LangChain4j on GitHub Actions
# (pitest minion JVM crashes). Run pitest locally instead:
#   ./mvnw org.pitest:pitest-maven:mutationCoverage -pl bonita-connector-ai-{module}
# =============================================================================

name: Test Coverage

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage:
    name: JaCoCo Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17
          cache: maven

      - name: Configure Maven Settings
        uses: bonitasoft/maven-settings-action@v1
        with:
          keeper-secret-config: ${{ secrets.KSM_CONFIG }}

      - name: Make Maven Wrapper executable
        run: chmod +x mvnw

      - name: Build and test all modules
        run: ./mvnw -B -ntp clean verify

      - name: Generate Coverage Summary
        if: always()
        run: |
          echo "## JaCoCo Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Line Coverage | Branch Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------|----------------|" >> $GITHUB_STEP_SUMMARY

          for module_dir in bonita-connector-ai-*/; do
            module=$(basename "$module_dir")
            short="${module#bonita-connector-ai-}"
            xml="$module_dir/target/site/jacoco/jacoco.xml"

            if [ ! -f "$xml" ]; then
              continue
            fi

            # Extract line coverage from last counter element
            LINE_MISSED=$(grep 'type="LINE"' "$xml" | tail -1 | sed 's/.*missed="\([0-9]*\)".*/\1/')
            LINE_COVERED=$(grep 'type="LINE"' "$xml" | tail -1 | sed 's/.*covered="\([0-9]*\)".*/\1/')
            LINE_TOTAL=$((LINE_MISSED + LINE_COVERED))
            if [ "$LINE_TOTAL" -gt 0 ]; then
              LINE_PCT=$((LINE_COVERED * 100 / LINE_TOTAL))
            else
              LINE_PCT=0
            fi

            # Extract branch coverage
            BR_MISSED=$(grep 'type="BRANCH"' "$xml" | tail -1 | sed 's/.*missed="\([0-9]*\)".*/\1/')
            BR_COVERED=$(grep 'type="BRANCH"' "$xml" | tail -1 | sed 's/.*covered="\([0-9]*\)".*/\1/')
            BR_TOTAL=$((BR_MISSED + BR_COVERED))
            if [ "$BR_TOTAL" -gt 0 ]; then
              BR_PCT=$((BR_COVERED * 100 / BR_TOTAL))
            else
              BR_PCT=0
            fi

            echo "| **${short}** | ${LINE_PCT}% (${LINE_COVERED}/${LINE_TOTAL}) | ${BR_PCT}% (${BR_COVERED}/${BR_TOTAL}) |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> JaCoCo enforces 95% line / 90% branch coverage per module." >> $GITHUB_STEP_SUMMARY
          echo "> PIT mutation testing runs locally: \`./mvnw org.pitest:pitest-maven:mutationCoverage -pl bonita-connector-ai-{module}\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-reports
          path: '**/target/site/jacoco/'
          retention-days: 30
