name: 'Build PR'

on:
  pull_request:
    branches:
      - develop
      - release/*
      - support/*
    paths-ignore:
      - '.claude/**'
      - 'CLAUDE.md'
      - "**/README.adoc"
      - "CONTRIBUTING.adoc"
      - ".github/**"
      - "!.github/workflows/build-pr.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write

jobs:
  build-pr:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 17
          cache: "maven"

      - name: Configure Maven Settings
        if: ${{ secrets.KSM_CONFIG != '' }}
        uses: bonitasoft/maven-settings-action@v1
        with:
          keeper-secret-config: ${{ secrets.KSM_CONFIG }}

      - name: Build (with JFrog credentials)
        if: ${{ secrets.KSM_CONFIG != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B -ntp clean verify

      - name: Build (without JFrog - fork PRs)
        if: ${{ secrets.KSM_CONFIG == '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./mvnw -B -ntp clean verify -pl '!bonita-connector-ai-anthropic,!bonita-connector-ai-azure'

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always() # always run even if the previous step fails
        with:
          report_paths: "**/target/*-reports/TEST-*.xml"
