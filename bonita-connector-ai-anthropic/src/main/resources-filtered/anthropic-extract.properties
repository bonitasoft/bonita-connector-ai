defaultPage.pageTitle=AnthropicAI Extract Connector configuration
defaultPage.pageDescription=Extract connector main configuration.

advancedPage.pageTitle=AnthropicAI Extract Connector advanced configuration
advancedPage.pageDescription=Extract connector advanced configuration.

urlWidget.label=Anthropic API endpoint URL
urlWidget.description=The URL of the Anthropic API endpoint. If left blank, the default Anthropic API endpoint will be used.

apiKeyWidget.label=API Key
apiKeyWidget.description=The Anthropic API key. If left blank, the AI_API_KEY environment variable or system property will be used.

chatModelNameWidget.label=Chat model name
chatModelNameWidget.description=The Claude model to use (e.g. claude-sonnet-4-6, claude-haiku-4-5-20251001, claude-opus-4-6). Default: claude-sonnet-4-6.

sourceDocumentRefWidget.label=Source document reference
sourceDocumentRefWidget.description=The reference of the process document from where to extract content.

modelTemperatureWidget.label=Model temperature
modelTemperatureWidget.description=The temperature to use for the model. Higher values will result in more creative responses. Must be between 0 and 1.

requestTimeoutWidget.label=Request timeout
requestTimeoutWidget.description=The request timeout for AnthropicAI API calls in milliseconds.

fieldsToExtractWidget.label=Fields to extract
fieldsToExtractWidget.description=The list of fields to extract from the given document like firstName, lastName, address.

outputJsonSchemaWidget.label=Output JSON schema
outputJsonSchemaWidget.description=The JSON schema that represents how to structure the JSON connector output. If a JSON schema is specified, the 'fieldsToExtract' parameter is ignored.

sourceDocumentRefsWidget.label=Source document references
sourceDocumentRefsWidget.description=List of process document references to add as context. Use this for multiple documents.
