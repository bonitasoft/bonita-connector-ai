ai.category=AI connectors
connectorDefinitionDescription=Bonita connector: ${project.artifactId}-ask
connectorDefinitionLabel=Ask AI

defaultPage.pageTitle=Bonita AnthropicAI Ask Connector
defaultPage.pageDescription=Bonita AnthropicAI Ask Connector

advancedPage.pageTitle=AnthropicAI Ask Connector advanced configuration
advancedPage.pageDescription=Ask connector advanced configuration.

urlWidget.label=AnthropicAI API endpoint URL
urlWidget.description=The URL of the AnthropicAI API endpoint. If left blank, the default AnthropicAI API endpoint will be used.

apiKeyWidget.label=API Key
apiKeyWidget.description=The AnthropicAI API key. If left blank, the AI_API_KEY environment variable or system property will be used.

systemPromptWidget.label=System prompt
systemPromptWidget.description=The system prompt to pass to Claude. It helps to influence the behavior of the assistant and specify a default context. (ex: You are a personal finance advisor, providing guidance, etc.)

userPromptWidget.label=User prompt
userPromptWidget.description=The user prompt to pass to Claude.

sourceDocumentRefWidget.label=Source document reference
sourceDocumentRefWidget.description=The reference of the process document to add as context to the user prompt if provided.

outputJsonSchemaWidget.label=Output JSON schema
outputJsonSchemaWidget.description=The JSON schema that represents how to structure the JSON connector output.

chatModelNameWidget.label=Chat model name
chatModelNameWidget.description=The Claude model to use (e.g. claude-sonnet-4-6, claude-haiku-4-5-20251001, claude-opus-4-6). Default: claude-sonnet-4-6.

modelTemperatureWidget.label=Model temperature
modelTemperatureWidget.description=The temperature to use for the model. Higher values will result in more creative responses. Must be between 0 and 1.

requestTimeoutWidget.label=Request timeout
requestTimeoutWidget.description=The request timeout for AnthropicAI API calls in milliseconds.

sourceDocumentRefsWidget.label=Source document references
sourceDocumentRefsWidget.description=List of process document references to add as context. Use this for multiple documents.
