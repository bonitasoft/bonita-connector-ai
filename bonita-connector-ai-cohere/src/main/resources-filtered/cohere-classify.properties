ai.category=AI connectors
connectorDefinitionDescription=Bonita connector: ${project.artifactId}-classify
connectorDefinitionLabel=Classify a document

defaultPage.pageTitle=CohereAI Classify Connector configuration
defaultPage.pageDescription=Classify connector main configuration.

advancedPage.pageTitle=CohereAI Classify Connector advanced configuration
advancedPage.pageDescription=Classify connector advanced configuration.

urlWidget.label=Cohere Endpoint url
urlWidget.description=The url of the AI endpoint. If left blank, the Cohere OpenAI-compatible endpoint will be used.

apiKeyWidget.label=Cohere API Key
apiKeyWidget.description=The API Key to use. Default to a system env lookup for a variable named COHERE_API_KEY. If no value is provided, use 'changeMe' as a default key.

chatModelNameWidget.label=Chat model name
chatModelNameWidget.description=The model to use for chat like command-r-plus, command-r, command-a-03-2025, ...

modelTemperatureWidget.label=Model temperature
modelTemperatureWidget.description=The temperature to use for the model. Higher values will result in more creative responses. Must be between 0 and 1. Leave blank if the selected model does not support this parameter.

requestTimeoutWidget.label=Request timeout
requestTimeoutWidget.description=The request timeout for Cohere calls.

sourceDocumentRefWidget.label=Source document reference
sourceDocumentRefWidget.description=The reference of the process document to be classified.

sourceDocumentRefsWidget.label=Source document references
sourceDocumentRefsWidget.description=List of process document references to add as context. Use this for multiple documents.

categoriesWidget.label=Categories
categoriesWidget.description=The list of categories used to classify the given document (like RIB, ID, etc.). It is recommended to add a default category if none other matches such as 'Unknown'
