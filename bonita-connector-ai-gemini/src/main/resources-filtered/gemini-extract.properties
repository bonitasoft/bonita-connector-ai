ai.category=AI connectors
GeminiAI.category=GeminiAI
connectorDefinitionDescription=Bonita connector: ${project.artifactId}-extract
connectorDefinitionLabel=Extract information from a document

defaultPage.pageTitle=GeminiAI Extract Connector configuration
defaultPage.pageDescription=Extract connector main configuration.

advancedPage.pageTitle=GeminiAI Extract Connector advanced configuration
advancedPage.pageDescription=Extract connector advanced configuration.

urlWidget.label=Gemini API endpoint URL
urlWidget.description=The URL of the Gemini API endpoint. If left blank, the default Gemini API endpoint will be used.

apiKeyWidget.label=API Key
apiKeyWidget.description=The Gemini API key. If left blank, the AI_API_KEY environment variable or system property will be used.

chatModelNameWidget.label=Chat model name
chatModelNameWidget.description=The Gemini model to use (e.g. gemini-2.0-flash, gemini-1.5-pro, gemini-1.5-flash). Default: gemini-2.0-flash.

sourceDocumentRefWidget.label=Source document reference
sourceDocumentRefWidget.description=The reference of the process document from where to extract content.

modelTemperatureWidget.label=Model temperature
modelTemperatureWidget.description=The temperature to use for the model. Higher values will result in more creative responses. Must be between 0 and 1.

requestTimeoutWidget.label=Request timeout
requestTimeoutWidget.description=The request timeout for GeminiAI API calls in milliseconds.

fieldsToExtractWidget.label=Fields to extract
fieldsToExtractWidget.description=The list of fields to extract from the given document like firstName, lastName, address.

outputJsonSchemaWidget.label=Output JSON schema
outputJsonSchemaWidget.description=The JSON schema that represents how to structure the JSON connector output. If a JSON schema is specified, the 'fieldsToExtract' parameter is ignored.

sourceDocumentRefsWidget.label=Source document references
sourceDocumentRefsWidget.description=List of process document references to add as context. Use this for multiple documents.

enableDebugLoggingWidget.label=Enable Debug Logging
enableDebugLoggingWidget.description=Log API requests and responses for debugging (WARNING: may expose sensitive data in logs)

maxOutputTokensWidget.label=Max output tokens
maxOutputTokensWidget.description=Maximum number of tokens in the response. Leave blank for provider default.
topPWidget.label=Top P (nucleus sampling)
topPWidget.description=Controls diversity of output (0.0 to 1.0). Leave blank for provider default.
