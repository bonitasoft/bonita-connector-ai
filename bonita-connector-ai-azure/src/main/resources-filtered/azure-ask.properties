modelTemperatureWidget.label=Model temperature
modelTemperatureWidget.description=The temperature to use for the model. Higher values will result in more creative responses. Must be between 0 and 1.

requestTimeoutWidget.label=Request timeout
requestTimeoutWidget.description=The request timeout for Azure OpenAI calls.

apiVersionWidget.label=API Version
apiVersionWidget.description=The Azure OpenAI API version to use (default: 2024-10-21).

