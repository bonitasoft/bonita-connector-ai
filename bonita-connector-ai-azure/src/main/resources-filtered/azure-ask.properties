advancedPage.pageDescription=Ask connector advanced configuration.

urlWidget.label=Azure AI Foundry Endpoint
urlWidget.description=The Azure AI Foundry endpoint URL (e.g. https://your-resource.openai.azure.com). This is mandatory for Azure.

apiKeyWidget.label=Azure AI Foundry API Key
apiKeyWidget.description=The API Key to use. Default to a system env lookup for a variable named AI_API_KEY.

systemPromptWidget.label=System prompt
systemPromptWidget.description=The system prompt to pass to the Azure AI Foundry endpoint.

userPromptWidget.label=User prompt
userPromptWidget.description=The user prompt to pass to the Azure AI Foundry endpoint.

sourceDocumentRefWidget.label=Source document reference
sourceDocumentRefWidget.description=The reference of the process document to add as context to the user prompt if provided.

outputJsonSchemaWidget.label=Output JSON schema
outputJsonSchemaWidget.description=The JSON schema that represents how to structure the JSON connector output.

chatModelNameWidget.label=Deployment name
chatModelNameWidget.description=The Azure AI Foundry deployment name (e.g. gpt-4o, my-gpt4-deployment).

modelTemperatureWidget.label=Model temperature
modelTemperatureWidget.description=The temperature to use for the model. Higher values will result in more creative responses. Must be between 0 and 1.

requestTimeoutWidget.label=Request timeout
requestTimeoutWidget.description=The request timeout for Azure AI Foundry calls.

apiVersionWidget.label=API Version
apiVersionWidget.description=The Azure AI Foundry API version to use (default: 2024-10-21).

sourceDocumentRefsWidget.label=Source document references
sourceDocumentRefsWidget.description=List of process document references to add as context. Use this for multiple documents.

enableDebugLoggingWidget.label=Enable Debug Logging
enableDebugLoggingWidget.description=Log API requests and responses for debugging (WARNING: may expose sensitive data in logs)

maxOutputTokensWidget.label=Max output tokens
maxOutputTokensWidget.description=Maximum number of tokens in the response. Leave blank for provider default.
topPWidget.label=Top P (nucleus sampling)
topPWidget.description=Controls diversity of output (0.0 to 1.0). Leave blank for provider default.
